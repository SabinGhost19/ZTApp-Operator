apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: supplychainattestations.devsecops.licenta.ro
spec:
  group: devsecops.licenta.ro
  names:
    kind: SupplyChainAttestation
    plural: supplychainattestations
    singular: supplychainattestation
    shortNames:
      - sca
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                sourceValidation:
                  type: object
                  properties:
                    enforceCosign:
                      type: boolean
                      default: true
                    trustedIssuers:
                      type: array
                      items:
                        type: string
                provenance:
                  type: object
                  properties:
                    requireVoucher:
                      type: boolean
                      default: false
                    enforceHmacChain:
                      type: boolean
                      default: true
                    minSlsaLevel:
                      type: integer
                      minimum: 0
                      default: 0
                    trustedRepositories:
                      type: array
                      items:
                        type: string
                vulnerabilityPolicy:
                  type: object
                  properties:
                    maxAllowedSeverity:
                      type: string
                      enum: [Low, Medium, High, Critical]
                    failOnFixable:
                      type: boolean
                      default: false
                sbomPolicy:
                  type: object
                  properties:
                    enforceSBOM:
                      type: boolean
                      default: true
                    forbiddenPackages:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          maxVersion:
                            type: string
                policyBinding:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    requireAttestationType:
                      type: string
                      default: https://devsecops.licenta.ro/attestations/custom-zta-policy/v1
                strictManifestHash:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    enforcementAction:
                      type: string
                      enum: [Reject, Alert]
                      default: Reject
                runtimeEnforcement:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    onPolicyDrift:
                      type: string
                      enum: [Isolate, Kill, Alert]
                      default: Isolate
                    onVulnerabilityFound:
                      type: string
                      enum: [Kill, Alert]
                      default: Alert
      additionalPrinterColumns:
        - name: DriftAction
          type: string
          jsonPath: .spec.runtimeEnforcement.onPolicyDrift
